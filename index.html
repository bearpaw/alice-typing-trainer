    <link rel="icon" type="image/svg+xml" href="/alice-typing-trainer/favicon.svg" />
    <meta name="theme-color" content="#14171f" />

    <script>
      (function () {
        try {
          var pref = localStorage.getItem('att.theme.v1');
          var resolved;
          if (pref === 'light' || pref === 'dark') {
            resolved = pref;
          } else {
            var h = new Date().getHours();
            resolved = h >= 6 && h < 18 ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', resolved === 'light' ? '#f6f7fa' : '#14171f');
        } catch (_) {}
      })();
    </script>

    <script>
      // SPA redirect decoder — counterpart to public/404.html.
      // Rewrites /?/posture back to /posture before React Router boots.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
