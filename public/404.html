<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Alice Typing Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // SPA redirect for GitHub Pages — encodes the requested path into a
      // query string, then redirects to index.html where the counterpart
      // script decodes it back. Adapted from rafgraph/spa-github-pages (MIT).
      (function () {
        var pathSegmentsToKeep = 1; // preserve the /alice-typing-trainer/ prefix
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
